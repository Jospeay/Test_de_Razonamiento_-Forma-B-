<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Evaluación en Curso</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom CSS -->
    <link href="../css/style.css" rel="stylesheet">
    <link href="../css/responsive.css" rel="stylesheet">
    <link href="../css/animations.css" rel="stylesheet">
</head>
<body class="eval-layout bg-light" id="contenedorEvaluacion">

    <header class="eval-header">
        <div class="container d-flex justify-content-between align-items-center">
            <h4 class="mb-0 text-primary-custom" style="font-family: 'Poppins', sans-serif;">Test de Razonamiento</h4>
            
            <div id="timerContainer" class="timer-container">
                <i class="bi bi-stopwatch"></i>
                <span id="timerDisplay">12:00</span>
            </div>
        </div>
    </header>

    <div class="eval-content-area container">
        <div class="row">
            
            <!-- Área de Preguntas (Izquierda) -->
            <div class="col-lg-8">
                <div class="pro-card min-vh-50">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <span id="preguntaActualText" class="badge bg-primary-custom fs-6">Pregunta 1</span>
                    </div>

                    <h4 id="enunciadoText" class="mb-5 lh-base">
                        Cargando pregunta...
                    </h4>

                    <div id="opcionesContainer">
                        <!-- Las opciones se generan dinámicamente aquí -->
                    </div>

                    <hr class="my-5">

                    <div class="d-flex justify-content-between">
                        <button id="btnAnterior" class="btn btn-outline-custom px-4" disabled>
                            <i class="bi bi-arrow-left me-2"></i>Anterior
                        </button>
                        <button id="btnSiguiente" class="btn btn-primary-custom px-4">
                            Siguiente<i class="bi bi-arrow-right ms-2"></i>
                        </button>
                    </div>
                </div>
            </div>

            <!-- Panel de Navegación Lateral (Derecha) -->
            <div class="col-lg-4">
                <div class="pro-card sticky-top" style="top: 100px;">
                    <h5 class="mb-3 border-bottom pb-2">Navegación</h5>
                    
                    <div class="d-flex mb-3 fs-7" style="font-size: 0.85rem;">
                        <div class="d-flex align-items-center me-3">
                            <div class="rounded-circle me-1" style="width: 12px; height: 12px; background-color: #e9ecef; border: 1px solid #ced4da;"></div>
                            Sin responder
                        </div>
                        <div class="d-flex align-items-center me-3">
                            <div class="rounded-circle me-1" style="width: 12px; height: 12px; background-color: var(--primary-color);"></div>
                            Respondida
                        </div>
                        <div class="d-flex align-items-center">
                            <div class="rounded-circle me-1" style="width: 12px; height: 12px; background-color: var(--secondary-color);"></div>
                            Actual
                        </div>
                    </div>

                    <div id="navGrid" class="question-nav-grid mb-4">
                        <!-- Los botones de navegación se generan aquí -->
                    </div>

                    <button id="btnFinalizar" class="btn btn-danger w-100 py-2 fw-bold">
                        Finalizar Evaluación
                    </button>
                </div>
            </div>

        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/app.js"></script>
    <script src="../js/preguntas.js"></script>
    <script src="../js/temporizador.js"></script>
    <script src="../js/modalAdvertencia.js"></script>
    <script src="../js/seguridad.js"></script>
    <script src="../js/evaluacion.js"></script>
</body>
</html>
