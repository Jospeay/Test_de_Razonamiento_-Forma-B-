<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro del Aspirante</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Custom CSS -->
    <link href="../css/style.css" rel="stylesheet">
    <link href="../css/responsive.css" rel="stylesheet">
    <link href="../css/animations.css" rel="stylesheet">
</head>
<body class="bg-light">

    <header class="official-header mb-5">
        <div class="container text-center">
            <img src="../assets/img/logo.png" alt="Logo Universidad Americana" style="max-height: 60px;">
        </div>
    </header>

    <div class="container section-padding pt-0">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="pro-card fade-in">
                    <h2 class="mb-4 text-center">Registro del Aspirante</h2>
                    <p class="text-muted text-center mb-4">Por favor, complete todos sus datos personales cuidadosamente.</p>
                    
                    <form id="formRegistro">
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">Código de Aspirante</label>
                                <input type="text" class="form-control form-control-pro" id="codigo" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Cédula</label>
                                <input type="text" class="form-control form-control-pro" id="cedula" placeholder="000-000000-0000A" required>
                            </div>
                            
                            <div class="col-12">
                                <label class="form-label">Nombre Completo</label>
                                <input type="text" class="form-control form-control-pro" id="nombreCompleto" required>
                            </div>

                            <div class="col-md-4">
                                <label class="form-label">Edad</label>
                                <input type="number" class="form-control form-control-pro" id="edad" min="15" max="100" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Sexo</label>
                                <select class="form-select form-control-pro" id="sexo" required>
                                    <option value="">Seleccione...</option>
                                    <option value="MASCULINO">Masculino</option>
                                    <option value="FEMENINO">Femenino</option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">Tipo de Colegio</label>
                                <select class="form-select form-control-pro" id="tipoColegio" required>
                                    <option value="">Seleccione...</option>
                                    <option value="PUBLICO">Público</option>
                                    <option value="PRIVADO">Privado</option>
                                </select>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Departamento</label>
                                <select class="form-select form-control-pro" id="departamento" required>
                                    <option value="">Seleccione...</option>
                                    <option value="BOACO">Boaco</option>
                                    <option value="CARAZO">Carazo</option>
                                    <option value="CHINANDEGA">Chinandega</option>
                                    <option value="CHONTALES">Chontales</option>
                                    <option value="ESTELI">Estelí</option>
                                    <option value="GRANADA">Granada</option>
                                    <option value="JINOTEGA">Jinotega</option>
                                    <option value="LEON">León</option>
                                    <option value="MADRIZ">Madriz</option>
                                    <option value="MANAGUA">Managua</option>
                                    <option value="MASAYA">Masaya</option>
                                    <option value="MATAGALPA">Matagalpa</option>
                                    <option value="NUEVA_SEGOVIA">Nueva Segovia</option>
                                    <option value="RIVAS">Rivas</option>
                                    <option value="RIO_SAN_JUAN">Río San Juan</option>
                                    <option value="RACCN">RACCN</option>
                                    <option value="RACCS">RACCS</option>
                                </select>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Municipio</label>
                                <input type="text" class="form-control form-control-pro" id="municipio" required>
                            </div>
                            
                            <div class="col-md-12">
                                <label class="form-label">Zona</label>
                                <select class="form-select form-control-pro" id="zona" required>
                                    <option value="">Seleccione...</option>
                                    <option value="URBANA">Urbana</option>
                                    <option value="RURAL">Rural</option>
                                </select>
                            </div>


                            <div class="col-md-6">
                                <label class="form-label">Correo Electrónico</label>
                                <input type="email" class="form-control form-control-pro" id="correo" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Teléfono</label>
                                <input type="tel" class="form-control form-control-pro" id="telefono" required>
                            </div>
                        </div>

                        <hr class="my-4">
                        
                        <div class="d-flex justify-content-end">
                            <button type="submit" class="btn btn-primary-custom px-5">Siguiente</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../js/app.js"></script>
    <script src="../js/validaciones.js"></script>
    <script src="../js/seguridad.js"></script>
    <script src="../js/registro.js"></script>
</body>
</html>
